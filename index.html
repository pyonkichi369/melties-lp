<body>

<button class="lang-toggle" id="langToggle" aria-label="language">日本語</button>

<!-- HERO -->
<header class="hero">
  <div class="hero-art">
    <img src="images/group.png" alt="The seven Melties characters around the Melties logo" onerror="this.closest('.hero-art').classList.add('ph')">
    <span class="ph-label">Melties</span>
  </div>
  <h1 class="tagline">Every Day Melts Better.</h1>
  <a class="cta tiktok" href="https://www.tiktok.com/@melties.world" target="_blank" rel="noopener">
    <span class="tri">▶</span> <span data-i18n="watch"></span></a>
</header>

<!-- CHARACTER RAIL -->
<section class="sec">
  <h2 data-i18n="friends"></h2>
  <div class="rail" id="rail"></div>
  <p class="hint" data-i18n="swipe"></p>
</section>

<!-- STORY -->
<section class="sec story">
  <h2 data-i18n="story"></h2>
  <div class="story-steps" id="story"></div>
</section>

<!-- TIKTOK -->
<section class="sec tiktok-sec">
  <h2 data-i18n="latest"></h2>
  <div class="rail" id="tiktokRail"></div>
  <a class="cta tiktok small" href="https://www.tiktok.com/@melties.world" target="_blank" rel="noopener" data-i18n="seeall"></a>
</section>

<!-- WORLD -->
<section class="sec world">
  <h2 data-i18n="world"></h2>
  <div class="grid" id="world"></div>
  <p class="hint" data-i18n="more"></p>
</section>

<!-- GOODS -->
<section class="sec goods">
  <h2><span data-i18n="goods"></span> <span class="soon" data-i18n="soon"></span></h2>
  <div class="grid" id="goods"></div>
</section>

<!-- FOLLOW -->
<section class="sec sns">
  <h2 data-i18n="follow"></h2>
  <div class="follow">
    <a href="https://www.tiktok.com/@melties.world" target="_blank" rel="noopener">TikTok</a>
    <a href="https://www.instagram.com/melties.world" target="_blank" rel="noopener">Instagram</a>
  </div>
</section>

<footer class="footer">
  <img class="logo small" src="images/logo.png" alt="Melties logo">
  <p>© Melties</p>
  <p class="love" data-i18n="love"></p>
</footer>

<!-- CHARACTER MODAL -->
<div class="modal" id="modal" hidden>
  <div class="modal-card" id="modalCard"></div>
  <button class="modal-x" id="modalX" aria-label="close">×</button>
</div>

<script src="app.js"></script>
</body>
</html>
